# Self-host stack for pinka.finance — Postgres + Next.js web service.
#
# Local: `docker compose up --build`              -> http://localhost:3000
# Coolify: connect this repo, Coolify auto-detects this file and provisions both
#          services. Set env vars (POSTGRES_PASSWORD, RESEND_API_KEY, etc.) in
#          the Coolify UI; reverse proxy + Let's Encrypt cert is handled by
#          Coolify's Traefik.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinka
      POSTGRES_DB: pinka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Make pg_isready usable without -d arguments inside the healthcheck
      PGUSER: pinka
    volumes:
      - pinka_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinka -d pinka -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://pinka:${POSTGRES_PASSWORD}@postgres:5432/pinka?schema=public"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://pinka.finance}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-pinka <hello@pinka.finance>}
      WAITLIST_NOTIFY_EMAIL: ${WAITLIST_NOTIFY_EMAIL:-}
      NODE_ENV: production
    ports:
      - "3000:3000"
    # Inherits HEALTHCHECK from Dockerfile.

volumes:
  pinka_pg_data:
    driver: local
